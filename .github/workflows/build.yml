name: Build IPTV Ultra

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: pip install pyinstaller PyQt5 requests python-vlc

    - name: Install VLC via Chocolatey
      shell: pwsh
      run: choco install vlc -y --no-progress

    - name: Build with PyInstaller
      shell: pwsh
      run: |
        pyinstaller `
          --noconfirm `
          --onedir `
          --windowed `
          --name "IPTV Player Pro" `
          --add-data "C:\Program Files\VideoLAN\VLC\libvlc.dll;." `
          --add-data "C:\Program Files\VideoLAN\VLC\libvlccore.dll;." `
          --add-data "C:\Program Files\VideoLAN\VLC\plugins;plugins" `
          iptv_player.py

    - name: Install Inno Setup
      shell: pwsh
      run: choco install innosetup -y --no-progress

    - name: Compile installer
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: IPTV_Ultra_Setup
        path: Output\IPTV_Ultra_Setup.exe
